<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found - LinguaStories</title>
    <link rel="icon" type="image/png" href="/assets/img/linguastories.png" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #f3f0eb;
        color: #1d293f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .not-found {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      .not-found-panel {
        max-width: 520px;
      }

      .not-found img {
        height: 72px;
        width: 72px;
        object-fit: contain;
      }

      .not-found h1 {
        margin: 20px 0 10px;
        font-size: clamp(36px, 7vw, 68px);
        line-height: 1;
      }

      .not-found p {
        color: #6c757d;
        font-size: 18px;
        line-height: 1.6;
      }

      .not-found a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: #e07258;
        color: #ffffff;
        font-weight: 800;
        margin-top: 18px;
        padding: 0 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="not-found">
      <section class="not-found-panel">
        <img src="/assets/img/linguastories.png" alt="" />
        <h1>Page not found</h1>
        <p>The page you requested is not available. Head back to LinguaStories and keep learning.</p>
        <a href="/">Back to home</a>
      </section>
    </main>
  </body>
</html>
